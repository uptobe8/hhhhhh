<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Tartazo entre amigas</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#ffd2ec;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:#24172f}
iframe{position:fixed;inset:0;width:100vw;height:100dvh;border:0;background:#ffd2ec}
#tapSound{position:fixed;inset:0;z-index:9999;display:none;place-items:center;text-align:center;background:linear-gradient(135deg,rgba(255,239,215,.96),rgba(255,196,228,.96));padding:18px}
#tapSound.show{display:grid}
#tapSound .box{background:#fff;border:5px solid #24172f;box-shadow:10px 10px 0 #24172f;padding:22px;max-width:380px;font-weight:900}
#tapSound h1{font-size:34px;line-height:.92;margin:0 0 12px;letter-spacing:-.05em}
#tapSound button{border:3px solid #24172f;background:#ff3d82;color:#fff;padding:14px 18px;font-weight:1000;box-shadow:5px 5px 0 #24172f;cursor:pointer;text-transform:uppercase}
#tapSound p{font-size:14px;line-height:1.3;margin:10px 0 0}
</style>
</head>
<body>
<iframe id="game" title="Tartazo entre amigas" allow="autoplay; fullscreen"></iframe>
<div id="tapSound">
  <div class="box">
    <h1>Tartazo<br>entre amigas</h1>
    <button id="soundBtn">Entrar con música</button>
    <p>En móvil hace falta este toque para que el sonido arranque.</p>
  </div>
</div>
<script>
const game = document.getElementById('game');
const overlay = document.getElementById('tapSound');
const btn = document.getElementById('soundBtn');
const isMobile = matchMedia('(hover:none), (pointer:coarse)').matches;
let ctx = null;
let musicTimer = null;
let started = false;

function loadGame(){
  game.src = './Tarta%20Attack.html?v=' + Date.now();
}

function tone(freq, dur, vol){
  if(!ctx) return;
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = 'square';
  o.frequency.value = freq;
  o.connect(g); g.connect(ctx.destination);
  const now = ctx.currentTime;
  g.gain.setValueAtTime(vol, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + dur);
  o.start(now); o.stop(now + dur + .02);
}

function startParentMusic(){
  if(started) return;
  started = true;
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC) return;
  ctx = new AC();
  if(ctx.state === 'suspended') ctx.resume().catch(()=>{});
  tone(880,.10,.08);
  const notes = [262,330,392,523,392,330,294,440];
  let i = 0;
  musicTimer = setInterval(()=>{
    if(!ctx || ctx.state !== 'running') return;
    tone(notes[i++ % notes.length], .18, .035);
  },210);
}

function enter(){
  startParentMusic();
  overlay.classList.remove('show');
  game.focus();
}

btn.addEventListener('pointerdown', enter, {passive:true});
btn.addEventListener('click', enter);

loadGame();
if(isMobile){
  overlay.classList.add('show');
}
</script>
</body>
</html>
