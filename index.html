<script>
const game = document.getElementById('game');
const overlay = document.getElementById('tapSound');
const btn = document.getElementById('soundBtn');
const bgm = document.getElementById('bgm');
const fx = document.getElementById('fx');
let ctx = null;
let timer = null;
let entered = false;

function loadGame(){
  game.src = './Tarta%20Attack.html?v=' + Date.now();
}

function startWebAudioFallback(){
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    if(!ctx) ctx = new AC();
    if(ctx.state === 'suspended') ctx.resume().catch(()=>{});
    const notes = [262,330,392,523,392,330,294,440];
    let i = 0;
    if(timer) clearInterval(timer);
    timer = setInterval(()=>{
      if(!ctx || ctx.state !== 'running') return;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'square';
      o.frequency.value = notes[i++ % notes.length];
      o.connect(g); g.connect(ctx.destination);
      const now = ctx.currentTime;
      g.gain.setValueAtTime(.09, now);
      g.gain.exponentialRampToValueAtTime(.001, now + .18);
      o.start(now); o.stop(now + .2);
    },210);
  }catch(e){}
}

function enter(){
  if(entered) return;
  entered = true;
  bgm.volume = 1;
  fx.volume = 1;
  fx.currentTime = 0;
  fx.play().catch(()=>{});
  bgm.currentTime = 0;
  const p = bgm.play();
  startWebAudioFallback();
  Promise.resolve(p).then(()=>{
    overlay.classList.add('hide');
    game.focus();
  }).catch(()=>{
    overlay.classList.add('hide');
    game.focus();
  });
}

btn.addEventListener('pointerdown', enter, {passive:true});
btn.addEventListener('touchstart', enter, {passive:true});
btn.addEventListener('click', enter);

loadGame();
</script>
