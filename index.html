<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Tartazo entre amigas</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#ffd2ec;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:#24172f}
#load{position:fixed;inset:0;display:grid;place-items:center;text-align:center;background:linear-gradient(135deg,#ffefd7,#ffc4e4);font-weight:900;z-index:9999}
#load div{background:#fff;border:4px solid #24172f;box-shadow:8px 8px 0 #24172f;padding:22px;margin:20px}
</style>
</head>
<body>
<div id="load"><div>Cargando juego...</div></div>
<script>
const GAME_FILE = './Tarta%20Attack.html?v=' + Date.now();

const AUDIO_STATE_FIX = `  let audioCtx = null;
  let musicTimer = null;
  let audioUnlocked = false;
  let pendingMusicStart = false;

  function getAudioContext(){
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if(!AudioContextClass) return null;
    if(!audioCtx){
      audioCtx = new AudioContextClass();
      audioCtx.onstatechange = () => {
        if(audioCtx && audioCtx.state === 'running' && pendingMusicStart){
          pendingMusicStart = false;
          startMusic();
        }
      };
    }
    return audioCtx;
  }

  function unlockAudio(){
    if(muted) return;
    const ac = getAudioContext();
    if(!ac) return;
    try{
      if(ac.state === 'suspended') ac.resume().catch(()=>{});
      if(!audioUnlocked){
        const o = ac.createOscillator();
        const g = ac.createGain();
        g.gain.value = 0.00001;
        o.connect(g); g.connect(ac.destination);
        const now = ac.currentTime || 0;
        o.start(now);
        o.stop(now + 0.02);
        audioUnlocked = true;
      }
    }catch(e){}
  }

  function bindAudioUnlock(){
    ['pointerdown','touchstart','touchend','mousedown','keydown','click'].forEach(ev=>{
      document.addEventListener(ev, unlockAudio, {passive:true});
    });
  }`;

const AUDIO_FUNCTION_FIX = `  function audio(){
    if(muted) return null;
    const ac = getAudioContext();
    if(!ac) return null;
    try{ if(ac.state === 'suspended') ac.resume().catch(()=>{}); }catch(e){}
    return ac;
  }`;

const MUSIC_FUNCTION_FIX = `  function startMusic(){
    if(muted || state !== 'game') return;
    unlockAudio();
    const ac = audio();
    if(!ac || musicTimer) return;
    if(ac.state !== 'running'){
      pendingMusicStart = true;
      setTimeout(()=>{ if(state === 'game' && !muted && !musicTimer) startMusic(); }, 120);
      return;
    }
    pendingMusicStart = false;
    const notes = [262,330,392,523,392,330,294,440];
    let i = 0;
    musicTimer = setInterval(()=>{
      if(muted || state !== 'game' || paused) return;
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type='square';
      o.frequency.value = notes[i++ % notes.length];
      o.connect(g); g.connect(ac.destination);
      const now = ac.currentTime;
      g.gain.setValueAtTime(.025,now);
      g.gain.exponentialRampToValueAtTime(.001,now+.18);
      o.start(now); o.stop(now+.2);
    },210);
  }`;

function patch(html){
  html = html.replace(/<p class="small">[\s\S]*?<\/p>/, '<p class="small">Funciona online y en móvil con sonido activado por toque.</p>');
  html = html.replace(/  let audioCtx = null;\s*let musicTimer = null;/, AUDIO_STATE_FIX);
  html = html.replace(/  function audio\(\)\{[\s\S]*?\n  \}\n\n  function sfx\(type\)\{/, AUDIO_FUNCTION_FIX + '\n\n  function sfx(type){');
  html = html.replace(/  function startMusic\(\)\{[\s\S]*?\n  \}\n\n  function stopMusic\(\)\{/, MUSIC_FUNCTION_FIX + '\n\n  function stopMusic(){\n    pendingMusicStart = false;');
  html = html.replace("document.getElementById('playBtn').onclick = () => { show(select); };", "document.getElementById('playBtn').onclick = () => { unlockAudio(); show(select); };");
  html = html.replace("document.getElementById('howBtn').onclick = () => { show(how); };", "document.getElementById('howBtn').onclick = () => { unlockAudio(); show(how); };");
  html = html.replace("document.getElementById('backBtn').onclick = () => { show(menu); };", "document.getElementById('backBtn').onclick = () => { unlockAudio(); show(menu); };");
  html = html.replace("document.getElementById('howBackBtn').onclick = () => { show(menu); };", "document.getElementById('howBackBtn').onclick = () => { unlockAudio(); show(menu); };");
  html = html.replace("document.getElementById('startBtn').onclick = () => startGame();", "document.getElementById('startBtn').onclick = () => { unlockAudio(); startGame(); };");
  html = html.replace("document.getElementById('againBtn').onclick = () => { show(select); };", "document.getElementById('againBtn').onclick = () => { unlockAudio(); show(select); };");
  html = html.replace("document.getElementById('menuBtn').onclick = () => { state='menu'; fireBtn.classList.add('hide'); show(menu); };", "document.getElementById('menuBtn').onclick = () => { unlockAudio(); state='menu'; fireBtn.classList.add('hide'); show(menu); };");
  html = html.replace("selected = Number(card.dataset.player);", "unlockAudio();\n        selected = Number(card.dataset.player);");
  html = html.replace("if(muted) stopMusic(); else startMusic();", "if(muted) stopMusic(); else { unlockAudio(); startMusic(); }");
  html = html.replace("  setupButtons();", "  bindAudioUnlock();\n  setupButtons();");
  return html;
}

fetch(GAME_FILE,{cache:'no-store'})
  .then(r => r.ok ? r.text() : Promise.reject(r.status))
  .then(html => {
    const patched = patch(html);
    document.open();
    document.write(patched);
    document.close();
  })
  .catch(() => {
    document.getElementById('load').innerHTML = '<div>No se ha podido cargar Tarta Attack.html.<br>Abre <a href="./Tarta%20Attack.html">este enlace directo</a>.</div>';
  });
</script>
</body>
</html>
