<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Tartazo entre amigas</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#ffd2ec;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:#24172f}
#frame{width:100vw;height:100dvh;border:0;display:block;background:#ffd2ec}
#load{position:fixed;inset:0;display:grid;place-items:center;text-align:center;background:linear-gradient(135deg,#ffefd7,#ffc4e4);font-weight:900;z-index:3}
#load div{background:#fff;border:4px solid #24172f;box-shadow:8px 8px 0 #24172f;padding:22px;margin:20px}
</style>
</head>
<body>
<div id="load"><div>Cargando juego...</div></div>
<iframe id="frame" allow="autoplay; fullscreen"></iframe>
<script>
const GAME_FILE = './Tarta%20Attack.html?v=' + Date.now();
const iframe = document.getElementById('frame');
const loader = document.getElementById('load');

const AUDIO_FIX = `
  function unlockAudio(){
    if(muted) return null;
    const AudioEngine = window.AudioContext || window.webkitAudioContext;
    if(!AudioEngine) return null;
    if(!audioCtx) audioCtx = new AudioEngine();
    if(audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
    if(!audioCtx._unlocked){
      try{
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        g.gain.value = 0.0001;
        o.connect(g); g.connect(audioCtx.destination);
        o.start(0); o.stop(audioCtx.currentTime + 0.03);
        audioCtx._unlocked = true;
      }catch(e){}
    }
    return audioCtx;
  }

  function audio(){
    return unlockAudio();
  }
`;

const MUSIC_FIX = `  function startMusic(){
    if(muted || state !== 'game' || musicTimer) return;
    const ac = unlockAudio();
    if(!ac) return;
    const begin = () => {
      if(muted || state !== 'game' || musicTimer) return;
      const notes = [262,330,392,523,392,330,294,440];
      let i = 0;
      musicTimer = setInterval(()=>{
        if(muted || state !== 'game' || paused || ac.state !== 'running') return;
        const o = ac.createOscillator();
        const g = ac.createGain();
        o.type='square';
        o.frequency.value = notes[i++ % notes.length];
        o.connect(g); g.connect(ac.destination);
        const now = ac.currentTime;
        g.gain.setValueAtTime(.035,now);
        g.gain.exponentialRampToValueAtTime(.001,now+.18);
        o.start(now); o.stop(now+.2);
      },210);
    };
    if(ac.state === 'running') begin();
    else ac.resume().then(begin).catch(()=>{ musicBtn.textContent = 'Toca Música ON'; });
  }

  function stopMusic(){`;

function patch(html){
  html = html.replace(/<p class="small">[\s\S]*?<\/p>/, '<p class="small">Versión online actualizada.</p>');
  html = html.replace(/  function audio\(\)\{[\s\S]*?  function sfx\(type\)\{/, AUDIO_FIX + '\n  function sfx(type){');
  html = html.replace(/  function startMusic\(\)\{[\s\S]*?  function stopMusic\(\)\{/, MUSIC_FIX);
  html = html.replace("document.getElementById('startBtn').onclick = () => startGame();", "document.getElementById('startBtn').onclick = () => { unlockAudio(); startGame(); };");
  html = html.replace("if(muted) stopMusic(); else startMusic();", "if(muted) stopMusic(); else { unlockAudio(); startMusic(); }");
  html = html.replace("  setupButtons();", "  ['pointerdown','touchstart','click'].forEach(evt => document.addEventListener(evt, unlockAudio, {passive:true}));\n\n  setupButtons();");
  return html;
}

fetch(GAME_FILE,{cache:'no-store'})
  .then(r => r.ok ? r.text() : Promise.reject(r.status))
  .then(html => {
    iframe.srcdoc = patch(html);
    loader.style.display = 'none';
  })
  .catch(err => {
    loader.innerHTML = '<div>No se ha podido cargar Tarta Attack.html.<br>Abre <a href="./Tarta%20Attack.html">este enlace directo</a>.</div>';
  });
</script>
</body>
</html>
